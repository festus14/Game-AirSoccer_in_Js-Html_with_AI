<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Air Soccer</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
        }

        #startBackground,
        #background,
        #goal,
        #playerPaddle,
        #opponentPaddle,
        #ball,
        #score
        {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #tutorial
        {
            position: absolute;
            top: 105%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .button {
            background-color: #f4511e;
            border: none;
            border-radius: 12px;
            color: white;
            padding: 16px 32px;
            text-align: center;
            font-size: 16px;
            margin: 4px 2px;
            opacity: 0.6;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
        }
        #startButton:hover {
            opacity: 1
        }

        #startButton{
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translate(-50%, -50%);

        }

        #gameend-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #333;
            padding: 32px 48px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            font-family: Arial, sans-serif;
            min-width: 280px;
        }
        #gameend-modal h2 {
            margin: 0 0 8px;
            font-size: 28px;
        }
        #gameend-modal p {
            margin: 0 0 20px;
            font-size: 22px;
        }
        #restart-button {
            background-color: #f4511e;
            border: none;
            border-radius: 12px;
            color: white;
            padding: 12px 28px;
            font-size: 16px;
            cursor: pointer;
        }
        #restart-button:hover {
            opacity: 0.85;
        }

    </style>
</head>

<body>
    <canvas id="startBackground" width="1020" height="480"></canvas>

    <canvas id="background" width="1020" height="480"></canvas>
    <canvas id="goal" width="1020" height="480"></canvas>
    <canvas id="playerPaddle" width="1020" height="480"></canvas>
    <canvas id="opponentPaddle" width="1020" height="480"></canvas>
    <canvas id="ball" width="1020" height="480"></canvas>
    <canvas id="score" width="1020" height="480"></canvas>
    <canvas id="tutorial" width="840" height="250"></canvas>

    <button class="button" id="startButton">Start</button>

    <div id="gameend-modal" data-testid="gameend-modal" style="display: none;">
        <h2 id="gameend-title"></h2>
        <p id="gameend-score"></p>
        <button id="restart-button" data-testid="restart-button">Play Again</button>
    </div>

    <script type="module" src="./js/airSoccer.js"></script>
</body>

</html>
